name: Build and Release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies
        run: uv pip install pyinstaller
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: uv run pyinstaller --onefile --windowed --name "Apilage Downloader" --icon assets/icon.ico main.py
      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: uv run pyinstaller --onefile --windowed --name "Apilage Downloader" --icon assets/icon.icns main.py
      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: uv run pyinstaller --onefile --windowed --name "Apilage Downloader" main.py
      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv "dist/Apilage Downloader.exe" "dist/Apilage-Downloader-Windows.exe"
      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: mv "dist/Apilage Downloader" "dist/Apilage-Downloader-macOS"
      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv "dist/Apilage Downloader" "dist/Apilage-Downloader-Linux"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-app
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Apilage Downloader ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/Windows-app/Apilage-Downloader-Windows.exe
            artifacts/macOS-app/Apilage-Downloader-macOS
            artifacts/Linux-app/Apilage-Downloader-Linux